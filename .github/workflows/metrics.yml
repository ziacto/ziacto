name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: ziacto
          template: classic
          filename: github-metrics.svg
          output_action: commit
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dubai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, lines, bytes-size
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_lines: yes
          plugin_followup: yes
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_traffic: yes
          plugin_repositories: yes
          plugin_repositories_pinned: 6

# Setup needed (one-time):
# 1. Generate a Personal Access Token (classic) with: repo, read:org, read:user, read:packages
#    https://github.com/settings/tokens
# 2. Add it as a repository secret named METRICS_TOKEN:
#    Settings -> Secrets and variables -> Actions -> New repository secret
